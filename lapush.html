    <style>
        body {
            margin: 0;
            background-color: #050a12;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            visibility: hidden; /* Flash fix */
        }

        /* Fixed Background - Tumhari lapush.png wapas aa gayi */
        .background-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("/static/lapush.png");
            background-size: cover;
            background-position: center;
            filter: brightness(0.3);
            z-index: -1;
        }

        .page-wrapper {
            margin: 10vh auto;
            width: 90%;
            max-width: 900px;
            text-align: center;
            min-height: 80vh;
        }

        /* BUG FIXED: Card will never collapse to 0 height now */
        .hero-card {
            position: relative;
            min-height: 60vh; /* Minimum height fix */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: flex-end; /* Text niche rahega */
            background-color: #0a111a;
        }

        /* Image is absolutely positioned behind text */
        .lapush-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
            z-index: 0;
        }

        .text-overlay {
            position: relative;
            z-index: 1; /* Text image ke upar */
            width: 100%;
            background: linear-gradient(
                to top,
                rgba(5, 10, 18, 1) 0%,
                rgba(5, 10, 18, 0.9) 40%,
                transparent 100%
            );
            padding: 60px 20px 30px;
            box-sizing: border-box;
        }

        .warning-tag {
            color: #ff4d4d;
            letter-spacing: 3px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        h1 {
            color: white;
            font-size: 2.8rem;
            letter-spacing: 6px;
            margin: 0;
        }

        .tagline {
            color: #8fb3ff;
            font-style: italic;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        .description {
            color: #d1d7e0;
            margin-top: 15px;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 85%;
            margin-left: auto;
            margin-right: auto;
        }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            border: 2px solid #8fb3ff;
            color: #8fb3ff;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back-link:hover {
            background: #8fb3ff;
            color: #050a12;
        }

        @media (max-width: 768px) {
            .page-wrapper { width: 95%; margin-top: 5vh; }
            h1 { font-size: 2rem; letter-spacing: 3px; }
            .hero-card { min-height: 70vh; }
            .text-overlay { padding: 40px 15px 20px; }
