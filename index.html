<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwilightVibes | PNW Travel & Aesthetic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero" style="display: flex; flex-direction: column; align-items: center; text-align: center; padding: 60px 20px;">
        <h1 style="font-size: 3.5rem; letter-spacing: 5px;">TWILIGHT PNW</h1>
        <p style="font-size: 1.2rem; color: #8fb3ff; font-style: italic;">Forks Washington Travel Guide</p>
        <p style="font-size: 1.1rem; color: #dce8f0; margin-bottom: 10px;">"Everything about you invites me in."</p>

        <section class="weather-box" style="position: relative; margin: 20px auto; width: 280px; padding: 20px; border-radius: 15px; background: rgba(11,18,36,0.7); border: 1px solid #5b8fc9;">
            <p style="font-size: 0.8rem; letter-spacing: 2px; color: #8aaec8;">🌫️ LIVE FROM FORKS</p>
            <p style="font-size: 1.6rem; margin: 5px 0;"><strong id="w-temp">--°C</strong></p>
            <p id="w-condition" style="font-style: italic; font-size: 0.9rem;">Loading mist...</p>
        </section>

        <a href="quiz" class="quiz-btn" style="padding: 15px 30px; font-size: 1.1rem; background: #1e3a6e; color: white; border-radius: 25px; text-decoration: none;">🧛 Discover Your Coven</a>
    </header>

    <section class="characters" style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; padding: 40px;">
        <a href="characters/bella" style="text-decoration: none; color: white; text-align: center;">
            <div class="char-card" style="width: 150px; height: 150px; background: #151e30; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">Bella</div>
        </a>
        <a href="characters/edward" style="text-decoration: none; color: white; text-align: center;">
            <div class="char-card" style="width: 150px; height: 150px; background: #151e30; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">Edward</div>
        </a>
        <a href="characters/jacob" style="text-decoration: none; color: white; text-align: center;">
            <div class="char-card" style="width: 150px; height: 150px; background: #151e30; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">Jacob</div>
        </a>
    </section>

    <section class="destinations" style="padding: 40px; text-align: center;">
        <h2 style="font-size: 2rem; margin-bottom: 30px;">Featured Destinations</h2>
        <div style="display: flex; justify-content: center; gap: 25px; flex-wrap: wrap;">
            <a href="blog/seattle" style="text-decoration: none; width: 280px; padding: 20px; background: #0f1420; border-radius: 12px; color: white;">Seattle Guide</a>
            <a href="blog/portland-twilight" style="text-decoration: none; width: 280px; padding: 20px; background: #0f1420; border-radius: 12px; color: white;">Portland Locations</a>
            <a href="forks" style="text-decoration: none; width: 280px; padding: 20px; background: #0f1420; border-radius: 12px; color: white;">Forks Trip</a>
        </div>
    </section>

</body>
</html>
