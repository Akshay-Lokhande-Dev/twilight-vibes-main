        body {

        /* THE VISION TEXT DISPLAY */
        .vision-box {

            display: flex;

        #vision-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            line-height: 1.6;
            color: #ffffff;
            font-style: italic;
            opacity: 0; /* Hidden initially for animation */
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* Animation class */
        #vision-text.revealed {
            opacity: 1;
            transform: scale(1);
        }

        /* THE MAGICAL BUTTON */
        .vision-btn {

        .vision-btn:hover:not(:disabled) {

<body>

    <div class="bg-wrapper" id="page-bg"></div>

    <div class="vision-container">
        <div class="icon-top">👁️</div>
        <h1>Alice's Visions</h1>
        <p class="subtitle">"The future is subjective. Every decision changes it."</p>

        <div class="vision-box">
            <p id="vision-text" class="revealed">"Close your eyes. Focus your mind..."</p>
        </div>

        <button class="vision-btn" id="trigger-btn" onclick="generateVision()">See the Future</button>

        <a href="/" class="back-link">Return to Forks</a>
    </div>

    <script>
        // 🎬 MOVIE ACCURATE QUOTES
        const visions = [
            "The Volturi... they're coming for us. I saw them in the snow.",
            "He's not going to bite you. I've already seen it.",
            "Edward is in Volterra. He thinks you're dead. He's going to the Volturi.",
            "She's going to be one of us. I've seen exactly what you'll be.",
            "They're coming. And they have no intention of listening to us.",
            "I see a red sports car speeding down a wet highway... trouble is following.",
            "A storm is brewing in La Push. The wolves are phasing.",
            "I see a fierce battle in a clearing... but you are standing at the end of it.",
            "It's a subjective thing, the future. You just changed it.",
            "The newborn army is advancing. We don't have much time."
        ];

        const visionText = document.getElementById("vision-text");
        const btn = document.getElementById("trigger-btn");
        const pageBg = document.getElementById("page-bg");

        function generateVision() {
            // Disable button so user can't spam click and break animation
            btn.disabled = true;
            btn.innerText = "Seeing...";
            
            // Add a subtle flash effect to background
            pageBg.style.filter = "brightness(1.5) contrast(1.2)";

            // Fade out current text
            visionText.classList.remove("revealed");

            setTimeout(() => {
                // Change background back
                pageBg.style.filter = "brightness(0.85) contrast(1.2)";

                // Pick a random movie quote
                const randomIndex = Math.floor(Math.random() * visions.length);
                visionText.innerText = `"${visions[randomIndex]}"`;

                // Fade in new text
                visionText.classList.add("revealed");
                
                // Re-enable button
                btn.disabled = false;
                btn.innerText = "Glimpse Again";
            }, 800); // Waits exactly for the CSS fade-out to finish
        }
    </script>
